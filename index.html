<!DOCTYPE html>
<html lang="en">
<head>

  @font-face { font-family: 'Orbitron'; src: url('fonts/Orbitron-Medium.ttf') format('truetype'); font-weight: 500; font-display: swap; }
  @font-face { font-family: 'Orbitron'; src: url('fonts/Orbitron-SemiBold.ttf') format('truetype'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'Orbitron'; src: url('fonts/Orbitron-Bold.ttf') format('truetype'); font-weight: 700; font-display: swap; }
  @font-face { font-family: 'Orbitron'; src: url('fonts/Orbitron-ExtraBold.ttf') format('truetype'); font-weight: 800; font-display: swap; }
  @font-face { font-family: 'Orbitron'; src: url('fonts/Orbitron-Black.ttf') format('truetype'); font-weight: 900; font-display: swap; }
</style>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        screens: {
          xs: '420px',
        },
        fontFamily: {
          display: ['Orbitron', 'Space Grotesk', 'system-ui', 'sans-serif'],
          sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
          serif: ['Instrument Serif', 'serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
        colors: {
          ink: { 950: '#05060f', 900: '#0a0b1a', 800: '#10122a', 700: '#181a3a' },
          electric: { 300: '#a8b4ff', 400: '#8a90ff', 500: '#6366f1', 600: '#5048e5' },
          violet: { 400: '#c084fc', 500: '#a855f7', 600: '#9333ea' },
          cyan: { 300: '#67e8f9', 400: '#22d3ee' },
        },
      },
    },
  };
</script>
<style>
  html, body { overflow-x: clip; max-width: 100%; }
  html { scroll-behavior: smooth; }
  body { background: #05060f; color: #f5f5fa; font-family: 'Space Grotesk', sans-serif; }
  ::selection { background: rgba(168, 85, 247, 0.4); color: #fff; }

  .aurora { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .aurora::before, .aurora::after {
    content: ''; position: absolute; border-radius: 50%;
    filter: blur(100px); opacity: 0.5; animation: drift 18s ease-in-out infinite;
  }
  .aurora::before {
    width: 720px; height: 720px;
    background: radial-gradient(circle, #6366f1 0%, transparent 70%);
    top: -200px; left: -100px;
  }
  .aurora::after {
    width: 640px; height: 640px;
    background: radial-gradient(circle, #a855f7 0%, transparent 70%);
    bottom: -200px; right: -80px; animation-delay: -8s;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(40px, -30px) scale(1.1); }
  }

  .grid-bg {
    background-image:
      linear-gradient(to right, rgba(99,102,241,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(99,102,241,0.06) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 40%, transparent 100%);
            mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 40%, transparent 100%);
  }

  .gradient-text {
    background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 35%, #818cf8 65%, #22d3ee 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }

  .btn-glow {
    position: relative;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.1) inset,
      0 10px 30px -10px rgba(168, 85, 247, 0.6),
      0 0 40px -10px rgba(99, 102, 241, 0.5);
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .btn-glow:hover {
    transform: translateY(-2px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.15) inset,
      0 20px 50px -10px rgba(168, 85, 247, 0.7),
      0 0 60px -5px rgba(99, 102, 241, 0.7);
  }
  .btn-glow::after {
    content: ''; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent 50%);
    pointer-events: none;
  }

  .glow-card {
    position: relative;
    background: linear-gradient(180deg, rgba(20,22,50,0.6) 0%, rgba(10,11,26,0.6) 100%);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  .glow-card:hover {
    border-color: rgba(168, 85, 247, 0.4);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px -20px rgba(99, 102, 241, 0.4);
  }
  .glow-card::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
    background: linear-gradient(135deg, transparent 30%, rgba(168,85,247,0.4) 50%, transparent 70%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  .glow-card:hover::before { opacity: 1; }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  @keyframes orb-float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }
  .orb-float { animation: orb-float 8s ease-in-out infinite; }

  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .marquee { animation: marquee 40s linear infinite; }

  @keyframes pulse-glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }
  .pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }

  .nav-glass { background: rgba(10, 11, 26, 0.6); backdrop-filter: blur(20px) saturate(160%); border-bottom: 1px solid rgba(255,255,255,0.05); }

  .device-glow {
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08) inset,
      0 40px 80px -20px rgba(99, 102, 241, 0.5),
      0 0 120px -20px rgba(168, 85, 247, 0.4);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react" src="Icons.jsx"></script>
<script type="text/babel" data-presets="react" src="Logo.jsx"></script>
<script type="text/babel" data-presets="react" src="Nav.jsx"></script>
<script type="text/babel" data-presets="react" src="Hero.jsx"></script>
<script type="text/babel" data-presets="react" src="SocialProof.jsx"></script>
<script type="text/babel" data-presets="react" src="Features.jsx"></script>
<script type="text/babel" data-presets="react" src="Pricing.jsx"></script>
<script type="text/babel" data-presets="react" src="Contact.jsx"></script>
<script type="text/babel" data-presets="react" src="Footer.jsx"></script>

<script type="text/babel" data-presets="react">
const { useEffect } = React;

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: 0.12 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function App() {
  useReveal();
  return (
    <div className="relative">
      <Nav/>
      <main>
        <Hero/>
        <SocialProof/>
        <Features/>
        <Pricing/>
        <Contact/>
      </main>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
